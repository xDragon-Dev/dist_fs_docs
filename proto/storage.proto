syntax = "proto3";
package storage;

import "google/protobuf/empty.proto";

//Datatype that holds some metadata and info about a file upload it ✅
message UploadFooter {
  string checksum = 1;
}

//Datatype that contains binary file content and footer ✅
message UploadChunk {
  oneof data {
    UploadFooter footer  = 1;
    bytes        content = 2;
  }
}

//Datatype that holds the data of the file you want to download ✅
message DownloadResponse {
  bytes content = 1;
}

//Request to acces or indicate action related to a file
message FileRequest {
  string file_id = 1;
}

//-----SERVICE RELATED TO ALL PUBLIC OPERATIONS BETWEEN CLIENTS AND STORAGE SERVERS-----
service PublicStorage{
  //Returns all bytes of a file
  rpc DownloadFile(FileRequest) returns (stream DownloadResponse);
}

//-----SERVICE RELATED TO ALL PRIVATE FILE OPERATIONS BETWEEN CLIENTS AND STORAGE SERVERS-----
service PrivateStorage{
  //Obtains all bytes of your file and stores it
  rpc UploadFile(stream UploadChunk) returns (google.protobuf.Empty);
  //Deletes a file from a storage server
  rpc DeleteFile(FileRequest) returns (google.protobuf.Empty);
}

