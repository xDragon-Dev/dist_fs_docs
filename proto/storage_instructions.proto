syntax = "proto3";
package storage_instructions;

import "google/protobuf/empty.proto";

message DeleteFilesRequest {
  repeated string file_ids = 1;
}

message StorageStatus {
  uint32 cpu_usage        = 1;
  uint64 available_space = 2;
}

service StorageInstructions {
  //Deletes a files from a storage server
  rpc DeleteFiles(DeleteFilesRequest) returns (google.protobuf.Empty);
  //Requests cpu usage and available space in a storage node
  rpc HeartBeat(google.protobuf.Empty) returns (StorageStatus);
}