syntax = "proto3";
package metadata_private;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

//Datatype that contains relevant information to delete a user
message DeleteUserRequest {
  string user_name = 1;
}

//Datatype that contains relevant information to login
message ChangePasswordRequest {
  string user_name            = 1;
  string current_password     = 2;
  string new_password         = 3;
  string confirm_new_password = 4;
}

//Datatype that contains relevant information to login
message ChangeUserNameRequest {
  string current_user_name = 1;
  string new_user_name     = 2;
}

//Datatype that contains relevant information to upload a document
message UploadNodeRequest {
  uint64 size     = 1;
  string checksum = 2;
}

//Datatype that contains the id of a document you want to download or delete from a storage node
message DownloadNodeRequest {
  string document_id = 1;
}

//Datatype that contains information about a storage node you need to download or upload
message AssignedNode {
  string endpoint = 1;
  string operation = 2;
}

message DeleteDocumentRequest {
  string document_id = 1;
}

//Datatype that contains information abount a topic
message Topic {
  int32  topic_id   = 1;
  string topic_name = 2;
}

//Datatype that contains information abount a subtopic
message SubTopic {
  int32  subtopic_id   = 1;
  string subtopic_name = 2;
}

//List of various topics
message Topics {
  repeated Topic content = 1;
}

//List of various subtopics
message SubTopics {
  repeated SubTopic content = 1;
}

enum Scope {
  LOCAL  = 0;
  GLOBAL = 1;
}

//Holds a topic id to dedlete it
message CreateTopicRequest {
  string name  = 1;
  Scope  scope = 2;
}

//Holds a subtopic id to dedlete it
message CreateSubTopicRequest {
  string name  = 1;
  Scope  scope = 2;
}

//Holds a topic id to dedlete it
message DeleteTopicRequest {
  int32 topic_id = 1;
}

//Holds a subtopic id to dedlete it
message DeleteSubTopicRequest {
  int32 subtopic_id = 1;
}

// Tipo de documento cientifico
enum DocumentType {
  ORIGINALARTICLE = 0;
  REVIEW          = 1;
  CASEREPORT      = 2;
  LETTER          = 3;
  EDITORIAL       = 4;
  CONFERENCEPAPER = 5;
  THESIS          = 6;
}

//Holds the id of a document
message ScientificDocumentRequest {
  string document_id = 1;
}

// Representación del documento científico
message ScientificDocument {
  string          posted_by        = 1;
  string          title            = 2;
  repeated string authors          = 3;
  string          abstract         = 4;
  repeated string keywords         = 5;
  repeated string topics           = 6;
  repeated string sub_topics       = 7;
  DocumentType    document_type    = 8;
  int64           publication_date = 9;
  string          language         = 10;
}

//kinf of content in a search request
enum SearchKind {
  TITLE     = 0;
  PUBLISHER = 1;
  AUTHOR    = 2;
  KEYWOD    = 3;
}

//Datatype that contains search constraints
message SearchRequest {
  string                content        = 1;
  SearchKind            search_kind    = 2;
  repeated int32        topics         = 3;
  repeated int32        sub_topics     = 4;
  repeated DocumentType document_types = 5;
  int64                 start_date     = 6;
  int64                 end_date       = 7;
  repeated string       languages      = 8;
}

//Basic information to display from a search function result
message SearchResult {
  string       id               = 1;
  string       posted_by        = 2;
  string       title            = 3;
  DocumentType document_type    = 6;
  int64        publication_date = 7;
  string       language         = 8;
}

//Several search results wrapped in a single datatype
message SearchResults {
  repeated SearchResult results = 1;
}

//-----SERVICE RELATED TO ALL PRIVATE FILE OPERATIONS BETWEEN CLIENTS AND METADATA SERVERS-----
service MetadataPrivate {
  //Deletes the user with a given username and password
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  //Changes a user password
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  //Changes a user name
  rpc ChangeUserName(ChangeUserNameRequest) returns (google.protobuf.Empty);

  //Returns the proper node where a document is located to download it
  rpc GetDownloadNode(DownloadNodeRequest) returns (AssignedNode);
  //Returns a proper node to store a document
  rpc GetUploadNode(UploadNodeRequest) returns (AssignedNode);
  //Returns the proper node where a document is located to delete it
  rpc DeleteDocument(DeleteDocumentRequest) returns (google.protobuf.Empty);

  //Creates a topic inside the metadata
  rpc CreateTopic(CreateTopicRequest) returns (google.protobuf.Empty);
  //Deletes a topic inside the metadata
  rpc DeleteTopic(DeleteTopicRequest) returns (google.protobuf.Empty);
  //Returns all related topics to the requesting user
  rpc GetLocalTopics(google.protobuf.Empty) returns (Topics);

  //Creates a subtopic inside the metadata
  rpc CreateSubTopic(CreateSubTopicRequest) returns (google.protobuf.Empty);
  //Deletes a subtopic inside the metadata
  rpc DeleteSubTopic(DeleteSubTopicRequest) returns (google.protobuf.Empty);
  //Returns all related subtopics to the requesting user
  rpc GetLocalSubTopics(google.protobuf.Empty) returns (SubTopics);

  //Returns basic data of many documets given certain search constraints
  rpc SearchDocuments(SearchRequest) returns (SearchResults);
  //Returns the entire metadata of a document given its id
  rpc GetScientificDocument(ScientificDocumentRequest) returns (ScientificDocument);
}