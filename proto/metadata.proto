syntax = "proto3";
package metadata;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

//Userkind to define special permisions
enum Role {
  USER  = 0;
  ADMIN = 1;
}

//Datatype that contains relevant information to create a user
message CreateUserRequest {
  string user_name        = 1;
  string password         = 2;
  string confirm_password = 3;
  Role   user_role        = 4;
}

//Datatype that contains relevant information to delete a user
message DeleteUserRequest {
  string user_name = 1;
}

//Datatype that contains relevant information to login
message LogInRequest {
  string user_name = 1;
  string password  = 2;
  bool   remember  = 3;
}

//Datatype that contains relevant information to upload a document
message NodeUploadRequest {
  uint64 size     = 1;
  string checksum = 2;
}

//Datatype that contains the id of a document you want to download or delete from a storage node
message NodeRequest {
  string document_id = 1;
}

//Datatype that contains information about a storage node you need to download or upload
message AssignedNode {
  string ipv4_address = 1; // ej. "192.168.1.100:50051"
  string operation_id = 2; // ID temporal para que el Storage confíe en el cliente
}

//Datatype that holds a topic name
message Topic {
  string name = 1;
}

//Datatype that holds a subtopic name
message SubTopic {
  string name = 1;
}

//List of various topics
message Topics {
  repeated Topic content = 1;
}

//List of various subtopics
message SubTopics {
  repeated SubTopic content = 1;
}

// Tipo de documento cientifico
enum DocumentType {
  ORIGINALARTICLE = 0;
  REVIEW          = 1;
  CASEREPORT      = 2;
  LETTER          = 3;
  EDITORIAL       = 4;
  CONFERENCEPAPER = 5;
  THESIS          = 6;
}

//Holds the id of a document
message ScientificDocumentRequest {
  string id = 1;
}

// Representación del documento científico
message ScientificDocument {
  string            posted_by        = 1;
  string            title            = 2;
  repeated string   authors          = 3;
  string            abstract         = 4;
  repeated string   keywords         = 5;
  repeated Topic    topics           = 6;
  repeated SubTopic sub_topics       = 7;
  DocumentType      document_type    = 8;
  int64             publication_date = 9;
  string            language         = 10;
}

//kinf of content in a search request
enum SearchKind {
  TITLE     = 0;
  PUBLISHER = 1;
  AUTHOR    = 2;
  KEYWOD    = 3;
}

//Datatype that contains search constraints
message SearchRequest {
  string                content        = 1;
  SearchKind            search_kind    = 2;
  repeated Topic        topics         = 3;
  repeated SubTopic     sub_topics     = 4;
  repeated DocumentType document_types = 5;
  int64                 start_date     = 6;
  int64                 end_date       = 7;
  repeated string       languages      = 8;
}

//Basic information to display from a search function result
message SearchResult {
  string       id               = 1;
  string       posted_by        = 2;
  string       title            = 3;
  DocumentType document_type    = 6;
  int64        publication_date = 7;
  string       language         = 8;
}

//Several search results wrapped in a single datatype
message SearchResults {
  repeated SearchResult results = 1;
}

//-----SERVICE RELATED TO ALL PUBLIC FILE OPERATIONS BETWEEN CLIENTS AND METADATA SERVERS-----
service PublicMetadata {
  //Creates a user with a given username and password
  rpc CreateUser(CreateUserRequest) returns (google.protobuf.Empty);
  //Takes a given username and password and returns a jwt
  rpc LogIn(LogInRequest) returns (google.protobuf.StringValue);

  //Returns the proper node where a document is located to download it
  rpc GetDownloadNode(NodeRequest) returns (AssignedNode);

  //Returns all topics stored in database
  rpc GetTopics(google.protobuf.Empty) returns (Topics);
  //Returns all subtopics stored in database
  rpc GetSubTopics(google.protobuf.Empty) returns (SubTopics);

  //Returns the entire metadata of a document given its id
  rpc GetScientificDocument(ScientificDocumentRequest) returns (ScientificDocument);
  //Returns basic data of many documets given certain search constraints
  rpc SearchDocuments(SearchRequest) returns (SearchResults);
}

//-----SERVICE RELATED TO ALL PRIVATE FILE OPERATIONS BETWEEN CLIENTS AND METADATA SERVERS-----
service PrivateMetadata {
  //Deletes the user with a given username and password
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);

  //Returns a proper node to store a document
  rpc GetUploadNode(NodeUploadRequest) returns (AssignedNode);
  //Returns the proper node where a document is located to delete it
  rpc GetDeleteNode(NodeRequest) returns (AssignedNode);

  //Creates a topic inside the metadata
  rpc CreateTopic(Topic) returns (google.protobuf.Empty);
  //Deletes a topic inside the metadata
  rpc DeleteTopic(Topic) returns (google.protobuf.Empty);

  //Creates a subtopic inside the metadata
  rpc CreateSubTopic(SubTopic) returns (google.protobuf.Empty);
  //Deletes a subtopic inside the metadata
  rpc DeleteSubTopic(SubTopic) returns (google.protobuf.Empty);
}